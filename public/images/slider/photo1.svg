<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <!-- Fond ciel et herbe -->
  <defs>
    <linearGradient id="sky1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#87CEEB;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#E0F6FF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="grass1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#7CB342;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#558B2F;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- Ciel -->
  <rect width="1200" height="400" fill="url(#sky1)"/>
  
  <!-- Herbe -->
  <rect y="400" width="1200" height="200" fill="url(#grass1)"/>
  
  <!-- Soleil -->
  <circle cx="1000" cy="100" r="60" fill="#FFD700" opacity="0.8"/>
  
  <!-- Archer (silhouette) -->
  <g transform="translate(400, 250)">
    <!-- Tête -->
    <circle cx="0" cy="0" r="30" fill="#2E7D32"/>
    
    <!-- Corps -->
    <rect x="-15" y="30" width="30" height="80" rx="15" fill="#2E7D32"/>
    
    <!-- Bras gauche (tendu avec arc) -->
    <rect x="-80" y="40" width="70" height="15" rx="7" fill="#2E7D32" transform="rotate(-10 -45 47)"/>
    
    <!-- Bras droit (tire la corde) -->
    <rect x="15" y="45" width="60" height="12" rx="6" fill="#2E7D32" transform="rotate(15 45 51)"/>
    
    <!-- Jambes -->
    <rect x="-25" y="110" width="18" height="70" rx="9" fill="#2E7D32" transform="rotate(-5 -16 145)"/>
    <rect x="7" y="110" width="18" height="70" rx="9" fill="#2E7D32" transform="rotate(5 16 145)"/>
    
    <!-- Arc -->
    <path d="M -150 30 Q -180 60 -180 100 Q -180 140 -150 170" 
          fill="none" 
          stroke="#1B5E20" 
          stroke-width="8" 
          stroke-linecap="round"/>
    
    <!-- Corde de l'arc tendue -->
    <path d="M -150 30 L 60 50 L -150 170" 
          fill="none" 
          stroke="#424242" 
          stroke-width="3"/>
    
    <!-- Flèche -->
    <g transform="translate(60, 50) rotate(0)">
      <line x1="0" y1="0" x2="120" y2="0" stroke="#8D6E63" stroke-width="5"/>
      <path d="M 120 0 L 135 -7 L 135 7 Z" fill="#C62828"/>
      <path d="M 5 -5 L 0 0 L 5 5" fill="none" stroke="#FFD600" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Cible au loin -->
  <g transform="translate(900, 350)">
    <circle cx="0" cy="0" r="50" fill="#FFD700"/>
    <circle cx="0" cy="0" r="35" fill="#D32F2F"/>
    <circle cx="0" cy="0" r="20" fill="#FFD700"/>
    <circle cx="0" cy="0" r="8" fill="#D32F2F"/>
  </g>
  
  <!-- Texte -->
  <text x="600" y="550" 
        font-family="Arial, sans-serif" 
        font-size="36" 
        font-weight="bold" 
        fill="#FFFFFF" 
        text-anchor="middle"
        stroke="#2E7D32"
        stroke-width="2">Precision • Concentration • Passion</text>
</svg>
