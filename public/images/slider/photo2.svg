<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <!-- Fond -->
  <defs>
    <linearGradient id="sky2" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E8F5E9;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#C8E6C9;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#sky2)"/>
  
  <!-- Sol -->
  <ellipse cx="600" cy="550" rx="500" ry="30" fill="#81C784" opacity="0.3"/>
  
  <!-- Archer 1 (gauche) -->
  <g transform="translate(200, 280)">
    <circle cx="0" cy="0" r="25" fill="#1B5E20"/>
    <rect x="-12" y="25" width="24" height="70" rx="12" fill="#1B5E20"/>
    <rect x="-50" y="35" width="40" height="10" fill="#1B5E20" transform="rotate(-20 -30 40)"/>
    <rect x="12" y="35" width="40" height="10" fill="#1B5E20" transform="rotate(20 32 40)"/>
    <rect x="-18" y="95" width="15" height="60" rx="7" fill="#1B5E20"/>
    <rect x="3" y="95" width="15" height="60" rx="7" fill="#1B5E20"/>
    
    <!-- Arc -->
    <path d="M -70 30 Q -85 50 -85 70 Q -85 90 -70 110" 
          fill="none" stroke="#2E7D32" stroke-width="6"/>
  </g>
  
  <!-- Archer 2 (centre) -->
  <g transform="translate(450, 300)">
    <circle cx="0" cy="0" r="25" fill="#2E7D32"/>
    <rect x="-12" y="25" width="24" height="70" rx="12" fill="#2E7D32"/>
    <rect x="-50" y="35" width="40" height="10" fill="#2E7D32" transform="rotate(-15 -30 40)"/>
    <rect x="12" y="35" width="40" height="10" fill="#2E7D32" transform="rotate(15 32 40)"/>
    <rect x="-18" y="95" width="15" height="60" rx="7" fill="#2E7D32"/>
    <rect x="3" y="95" width="15" height="60" rx="7" fill="#2E7D32"/>
    
    <!-- Arc -->
    <path d="M -70 30 Q -85 50 -85 70 Q -85 90 -70 110" 
          fill="none" stroke="#388E3C" stroke-width="6"/>
  </g>
  
  <!-- Archer 3 (droite) -->
  <g transform="translate(700, 290)">
    <circle cx="0" cy="0" r="25" fill="#4CAF50"/>
    <rect x="-12" y="25" width="24" height="70" rx="12" fill="#4CAF50"/>
    <rect x="-50" y="35" width="40" height="10" fill="#4CAF50" transform="rotate(-25 -30 40)"/>
    <rect x="12" y="35" width="40" height="10" fill="#4CAF50" transform="rotate(25 32 40)"/>
    <rect x="-18" y="95" width="15" height="60" rx="7" fill="#4CAF50"/>
    <rect x="3" y="95" width="15" height="60" rx="7" fill="#4CAF50"/>
    
    <!-- Arc -->
    <path d="M -70 30 Q -85 50 -85 70 Q -85 90 -70 110" 
          fill="none" stroke="#66BB6A" stroke-width="6"/>
  </g>
  
  <!-- Cibles alignées -->
  <g transform="translate(950, 300)">
    <circle cx="0" cy="-50" r="40" fill="#FFE082"/>
    <circle cx="0" cy="-50" r="25" fill="#FF5722"/>
    <circle cx="0" cy="-50" r="12" fill="#FFE082"/>
    
    <circle cx="0" cy="50" r="40" fill="#FFE082"/>
    <circle cx="0" cy="50" r="25" fill="#FF5722"/>
    <circle cx="0" cy="50" r="12" fill="#FFE082"/>
    
    <circle cx="0" cy="150" r="40" fill="#FFE082"/>
    <circle cx="0" cy="150" r="25" fill="#FF5722"/>
    <circle cx="0" cy="150" r="12" fill="#FFE082"/>
  </g>
  
  <!-- Texte -->
  <text x="600" y="80" 
        font-family="Arial, sans-serif" 
        font-size="48" 
        font-weight="bold" 
        fill="#1B5E20" 
        text-anchor="middle">ENTRAÎNEMENT COLLECTIF</text>
  
  <text x="600" y="130" 
        font-family="Arial, sans-serif" 
        font-size="28" 
        fill="#2E7D32" 
        text-anchor="middle">Tous les mardis et jeudis • Tous niveaux</text>
</svg>
