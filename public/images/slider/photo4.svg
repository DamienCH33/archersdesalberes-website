<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 600" width="1200" height="600">
  <!-- Fond texture bois -->
  <defs>
    <linearGradient id="wood" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#8D6E63;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#A1887F;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8D6E63;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <rect width="1200" height="600" fill="url(#wood)"/>
  
  <!-- Lignes du bois -->
  <g opacity="0.1">
    <line x1="0" y1="150" x2="1200" y2="155" stroke="#3E2723" stroke-width="2"/>
    <line x1="0" y1="280" x2="1200" y2="275" stroke="#3E2723" stroke-width="3"/>
    <line x1="0" y1="420" x2="1200" y2="425" stroke="#3E2723" stroke-width="2"/>
  </g>
  
  <!-- Arc posé -->
  <g transform="translate(250, 200)">
    <path d="M 50 0 Q 0 100 0 200 Q 0 300 50 400" 
          fill="none" 
          stroke="#1B5E20" 
          stroke-width="12" 
          stroke-linecap="round"/>
    <line x1="50" y1="0" x2="50" y2="400" stroke="#424242" stroke-width="4"/>
    
    <!-- Détails de l'arc -->
    <ellipse cx="50" cy="200" rx="15" ry="25" fill="#5D4037"/>
  </g>
  
  <!-- Carquois avec flèches -->
  <g transform="translate(500, 150)">
    <!-- Carquois -->
    <rect x="0" y="50" width="80" height="300" rx="10" fill="#6D4C41"/>
    <ellipse cx="40" cy="50" rx="40" ry="15" fill="#8D6E63"/>
    <ellipse cx="40" cy="350" rx="40" ry="15" fill="#5D4037"/>
    
    <!-- Flèches dépassant -->
    <g transform="translate(40, 20)">
      <!-- Flèche 1 -->
      <line x1="-15" y1="0" x2="-15" y2="-80" stroke="#8D6E63" stroke-width="5"/>
      <path d="M -15 -80 L -20 -95 L -10 -95 Z" fill="#C62828"/>
      <path d="M -18 -5 L -15 0 L -12 -5" fill="none" stroke="#FFD600" stroke-width="2"/>
      
      <!-- Flèche 2 -->
      <line x1="0" y1="0" x2="0" y2="-90" stroke="#8D6E63" stroke-width="5"/>
      <path d="M 0 -90 L -5 -105 L 5 -105 Z" fill="#C62828"/>
      <path d="M -3 -5 L 0 0 L 3 -5" fill="none" stroke="#FFD600" stroke-width="2"/>
      
      <!-- Flèche 3 -->
      <line x1="15" y1="0" x2="15" y2="-75" stroke="#8D6E63" stroke-width="5"/>
      <path d="M 15 -75 L 10 -90 L 20 -90 Z" fill="#C62828"/>
      <path d="M 12 -5 L 15 0 L 18 -5" fill="none" stroke="#FFD600" stroke-width="2"/>
    </g>
  </g>
  
  <!-- Cible appuyée -->
  <g transform="translate(850, 250)">
    <circle cx="0" cy="0" r="120" fill="#FFEB3B"/>
    <circle cx="0" cy="0" r="90" fill="#FF5722"/>
    <circle cx="0" cy="0" r="60" fill="#FFEB3B"/>
    <circle cx="0" cy="0" r="30" fill="#FF5722"/>
    <circle cx="0" cy="0" r="15" fill="#FFD700"/>
    
    <!-- Flèches plantées -->
    <g transform="rotate(-15)">
      <line x1="5" y1="-120" x2="5" y2="-180" stroke="#8D6E63" stroke-width="4"/>
      <path d="M 5 -180 L 0 -190 L 10 -190 Z" fill="#C62828"/>
    </g>
    <g transform="rotate(25)">
      <line x1="-8" y1="-30" x2="-8" y2="-100" stroke="#8D6E63" stroke-width="4"/>
      <path d="M -8 -100 L -13 -110 L -3 -110 Z" fill="#C62828"/>
    </g>
  </g>
  
  <!-- Gant et palette -->
  <g transform="translate(100, 450)">
    <ellipse cx="0" cy="0" rx="50" ry="30" fill="#5D4037"/>
    <rect x="-45" y="-25" width="20" height="50" rx="10" fill="#6D4C41"/>
    <rect x="-20" y="-28" width="18" height="56" rx="9" fill="#6D4C41"/>
    <rect x="5" y="-28" width="18" height="56" rx="9" fill="#6D4C41"/>
    <rect x="30" y="-25" width="20" height="50" rx="10" fill="#6D4C41"/>
  </g>
  
  <!-- Badge/texte -->
  <g transform="translate(600, 80)">
    <rect x="-200" y="-40" width="400" height="80" rx="15" fill="#2E7D32"/>
    <text x="0" y="-5" 
          font-family="Arial, sans-serif" 
          font-size="32" 
          font-weight="bold" 
          fill="#FFFFFF" 
          text-anchor="middle">MATÉRIEL PROFESSIONNEL</text>
    <text x="0" y="25" 
          font-family="Arial, sans-serif" 
          font-size="20" 
          fill="#E8F5E9" 
          text-anchor="middle">Arc • Flèches • Accessoires</text>
  </g>
</svg>
